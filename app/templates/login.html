{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
  <div class="text-center mb-6">
    <div class="flex justify-center items-center gap-2 mb-2">
      <span class="text-5xl">🐑</span>
      <div>
        <span class="font-bold text-4xl tracking-tighter">PiHerder</span>
        <div class="text-emerald-400 text-xs font-mono">SECURE FLEET CONTROL</div>
      </div>
    </div>
  </div>
  <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-8">
    <h1 class="text-2xl font-semibold mb-6">Sign in</h1>

    {% if request.query_params.get('error') %}
      <div class="mb-4 p-3 bg-red-900/50 border border-red-700 text-red-200 text-sm rounded">
        Invalid email or password.
      </div>
    {% endif %}

    <div class="mb-4 p-2 bg-zinc-800 border border-zinc-700 rounded text-xs text-zinc-400">
      First time? Default: <strong>admin@example.com</strong> / <strong>admin</strong><br>
      (Change it after logging in)
    </div>

    <form method="post" action="/auth/login" class="space-y-4">
      <div>
        <label class="block text-sm mb-1">Email</label>
        <input name="email" type="email" value="admin@example.com" required
               class="w-full bg-zinc-950 border border-zinc-700 px-3 py-2 rounded focus:outline-none focus:border-emerald-500">
      </div>
      <div>
        <label class="block text-sm mb-1">Password</label>
        <input name="password" type="password" value="admin" required
               class="w-full bg-zinc-950 border border-zinc-700 px-3 py-2 rounded focus:outline-none focus:border-emerald-500">
      </div>

      <button type="submit"
              class="w-full mt-2 py-2.5 bg-emerald-600 hover:bg-emerald-500 font-medium rounded-lg transition">
        Log in
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-zinc-400">
      Don't have an account?
      <a href="/auth/register" class="text-emerald-400 hover:underline">Register</a>
    </p>
  </div>
</div>
{% endblock %}
