{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
  <div class="text-center mb-6">
    <div class="flex justify-center items-center gap-2 mb-2">
      <img src="/static/images/piherder-logo-small.png" alt="PiHerder" class="h-12 w-auto">
      <div>
        <span class="font-bold text-4xl tracking-tighter">PiHerder</span>
        <div class="text-accent text-xs font-mono">SECURE FLEET CONTROL</div>
      </div>
    </div>
  </div>
  <div class="card rounded-2xl p-8">
    <h1 class="text-2xl font-semibold mb-6">Sign in</h1>

    {% if request.query_params.get('error') %}
      <div class="mb-4 p-3 banner-error border text-sm rounded">
        Invalid email or password.
      </div>
    {% endif %}

    <div class="mb-4 p-2 bg-surface border border-border rounded text-xs text-muted">
      First time? Default: <strong>admin@example.com</strong> / <strong>admin</strong><br>
      (Change it after logging in)
    </div>

    <form method="post" action="/auth/login" class="space-y-4">
      <div>
        <label class="block text-sm mb-1">Email</label>
        <input name="email" type="email" value="admin@example.com" required
               class="w-full bg-surface border border-border px-3 py-2 rounded focus:outline-none focus:border-accent">
      </div>
      <div>
        <label class="block text-sm mb-1">Password</label>
        <input name="password" type="password" value="admin" required
               class="w-full bg-surface border border-border px-3 py-2 rounded focus:outline-none focus:border-accent">
      </div>

      <button type="submit"
              class="w-full mt-2 py-2.5 btn btn-accent font-medium rounded-lg transition">
        Log in
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-muted">
      Don't have an account?
      <a href="/auth/register" class="text-accent hover:underline">Register</a>
    </p>
  </div>
</div>
{% endblock %}
