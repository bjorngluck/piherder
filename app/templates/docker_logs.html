{% extends "base.html" %}

{% block content %}
<div class="max-w-6xl mx-auto">
  <a href="/servers/{{ server.id }}/docker?nocache=1" class="text-xs text-emerald-400">← Docker</a>

  <h1 class="text-2xl font-semibold mt-2">Logs: <span class="font-mono">{{ container }}</span></h1>

  <div class="flex gap-2 my-4">
    <a href="/servers/{{ server.id }}/docker/logs/{{ container }}?lines=50" class="text-xs px-3 py-1 bg-zinc-800 rounded">Last 50</a>
    <a href="/servers/{{ server.id }}/docker/logs/{{ container }}?lines=200" class="text-xs px-3 py-1 bg-zinc-800 rounded">Last 200</a>
    <a href="/servers/{{ server.id }}/docker/logs/{{ container }}?lines=500" class="text-xs px-3 py-1 bg-zinc-800 rounded">Last 500</a>
    <a href="/servers/{{ server.id }}/docker?nocache=1" class="text-xs px-3 py-1 bg-zinc-700 rounded ml-auto">Back to list</a>
  </div>

  <div class="flex gap-2 mb-3 flex-wrap">
    <button onclick="startLiveStream()" 
            class="px-4 py-1.5 text-xs bg-emerald-700 hover:bg-emerald-600 rounded">
      ▶ Start Live Tail -f
    </button>
    <button onclick="stopLiveStream()" 
            class="px-4 py-1.5 text-xs bg-zinc-700 hover:bg-zinc-600 rounded">
      ■ Stop
    </button>
    <button onclick="clearLogs()" 
            class="px-4 py-1.5 text-xs bg-zinc-800 hover:bg-zinc-700 rounded">
      Clear
    </button>
    <button onclick="toggleAutoScroll()" 
            id="autoscroll-btn"
            class="px-4 py-1.5 text-xs bg-zinc-800 hover:bg-zinc-700 rounded">
      Auto-scroll: ON
    </button>
    <a href="?lines=500" class="px-3 py-1.5 text-xs bg-zinc-800 hover:bg-zinc-700 rounded ml-auto">Reload static</a>
  </div>

  <pre id="log-output" 
       class="bg-black border border-zinc-800 p-4 rounded text-xs overflow-auto max-h-[70vh] whitespace-pre-wrap font-mono leading-tight">{{ logs or "(no logs)" }}</pre>

  <div class="mt-3 text-xs text-zinc-500">
    Static view + live SSE streaming (follows <code>docker logs -f</code> via SSH).
  </div>

  <script>
    let eventSource = null;
    let autoScroll = true;

    const SERVER_ID = {{ server.id | tojson }};
    const CONTAINER_NAME = {{ container | tojson }};

    function startLiveStream() {
      stopLiveStream();
      const output = document.getElementById('log-output');
      output.textContent = '';

      const streamUrl = `/servers/${SERVER_ID}/docker/logs/${encodeURIComponent(CONTAINER_NAME)}/stream?lines=20`;
      eventSource = new EventSource(streamUrl);

      eventSource.onmessage = function(e) {
        output.textContent += e.data + '\n';
        if (autoScroll) output.scrollTop = output.scrollHeight;
      };

      eventSource.onerror = function() {
        output.textContent += '\n[Stream ended or error]\n';
        stopLiveStream();
      };
    }

    function stopLiveStream() {
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
    }

    function clearLogs() {
      document.getElementById('log-output').textContent = '';
    }

    function toggleAutoScroll() {
      autoScroll = !autoScroll;
      const btn = document.getElementById('autoscroll-btn');
      btn.textContent = 'Auto-scroll: ' + (autoScroll ? 'ON' : 'OFF');
    }

    window.addEventListener('load', () => {
      const out = document.getElementById('log-output');
      out.scrollTop = out.scrollHeight;
    });
  </script>
</div>
{% endblock %}
