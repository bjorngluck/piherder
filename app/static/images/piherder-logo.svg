<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Raspberry Pi cowboy mascot for PiHerder -->
  <!-- Raspberry body -->
  <g>
    <!-- Main raspberry -->
    <circle cx="100" cy="110" r="45" fill="#E60012"/>
    <!-- Dots on raspberry -->
    <circle cx="85" cy="95" r="8" fill="#C8102E"/>
    <circle cx="115" cy="95" r="8" fill="#C8102E"/>
    <circle cx="80" cy="115" r="7" fill="#C8102E"/>
    <circle cx="120" cy="115" r="7" fill="#C8102E"/>
    <circle cx="95" cy="130" r="6" fill="#C8102E"/>
    <circle cx="105" cy="130" r="6" fill="#C8102E"/>
    <!-- Leaves -->
    <ellipse cx="85" cy="70" rx="18" ry="12" fill="#00A651" transform="rotate(-30 85 70)"/>
    <ellipse cx="115" cy="70" rx="18" ry="12" fill="#00A651" transform="rotate(30 115 70)"/>
    <!-- Cowboy hat -->
    <path d="M65 65 Q100 45 135 65" fill="none" stroke="#8B5A2B" stroke-width="12"/>
    <ellipse cx="100" cy="68" rx="38" ry="8" fill="#8B5A2B"/>
    <!-- Eyes -->
    <circle cx="88" cy="105" r="5" fill="#111827"/>
    <circle cx="112" cy="105" r="5" fill="#111827"/>
    <!-- Smile -->
    <path d="M90 118 Q100 125 110 118" fill="none" stroke="#111827" stroke-width="3"/>
  </g>
  <!-- Lasso -->
  <path d="M130 90 Q160 70 180 100 Q170 130 140 115" fill="none" stroke="#8B5A2B" stroke-width="6" stroke-linecap="round"/>
  <!-- Circuit roots at bottom -->
  <g fill="none" stroke="#374151" stroke-width="2">
    <path d="M70 155 L70 175"/>
    <path d="M85 155 L85 180"/>
    <path d="M100 155 L100 185"/>
    <path d="M115 155 L115 180"/>
    <path d="M130 155 L130 175"/>
    <!-- Branches -->
    <path d="M70 165 L60 170"/>
    <path d="M85 170 L75 178"/>
    <path d="M100 175 L90 185"/>
    <path d="M115 170 L125 178"/>
    <path d="M130 165 L140 170"/>
  </g>
  <!-- Small Pi chip being lassoed -->
  <g transform="translate(155, 85)">
    <rect x="0" y="0" width="20" height="20" rx="2" fill="#111827"/>
    <rect x="3" y="3" width="14" height="14" fill="#00A651"/>
    <circle cx="10" cy="10" r="4" fill="#111827"/>
    <!-- Pins -->
    <rect x="-3" y="5" width="3" height="2" fill="#111827"/>
    <rect x="-3" y="10" width="3" height="2" fill="#111827"/>
    <rect x="-3" y="15" width="3" height="2" fill="#111827"/>
    <rect x="20" y="5" width="3" height="2" fill="#111827"/>
    <rect x="20" y="10" width="3" height="2" fill="#111827"/>
    <rect x="20" y="15" width="3" height="2" fill="#111827"/>
  </g>
</svg>