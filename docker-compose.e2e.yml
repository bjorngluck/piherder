# Compose set "e2e" — same project folder / compose project as main.
# Not a second stack card in PiHerder Docker view.
#
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d
#   docker compose -f docker-compose.e2e.yml up -d   # set-only (still -p piherder)
#
# Playwright still points at http://127.0.0.1:18000

services:
  e2e-db:
    image: postgres:16-alpine
    container_name: piherder-e2e-db
    environment:
      - POSTGRES_USER=piherder
      - POSTGRES_PASSWORD=piherder
      - POSTGRES_DB=piherder
    volumes:
      - e2e_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piherder"]
      interval: 5s
      timeout: 5s
      retries: 10

  e2e-redis:
    image: redis:7-alpine
    container_name: piherder-e2e-redis
    restart: unless-stopped
    volumes:
      - e2e_redis_data:/data

  e2e-web:
    image: ${PIHERDER_IMAGE:-piherder:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: piherder-e2e-web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "18000:8000"
    environment:
      PIHERDER_MASTER_KEY: ${PIHERDER_E2E_MASTER_KEY:-IvJBhp2Ph5UNKZPyvIdwO5qanN854FobUZqh_frSb2U=}
      SECRET_KEY: ${PIHERDER_E2E_SECRET_KEY:-e2e-secret-key-not-for-production-use}
      DATABASE_URL: postgresql://piherder:piherder@e2e-db:5432/piherder
      CELERY_BROKER_URL: redis://e2e-redis:6379/0
      CELERY_RESULT_BACKEND: redis://e2e-redis:6379/0
      REDIS_URL: redis://e2e-redis:6379/0
      DATA_ROOT: /data
      BACKUP_ROOT: /backups
      HERDER_BACKUP_ROOT: /herder_backups
      ALLOW_OPEN_REGISTRATION: "false"
      PIHERDER_UPDATE_CHECK: "false"
      COOKIE_SECURE: "false"
      # Playwright suite logs in many times (per-test admin_page); avoid 20/5min lockout
      PIHERDER_DISABLE_AUTH_RATE_LIMIT: "true"
      CADDY_ADMIN_URL: ""
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - e2e_backups:/backups
      - e2e_herder_backups:/herder_backups
      - e2e_data:/data
      - e2e_certs:/certs
    depends_on:
      e2e-db:
        condition: service_healthy
      e2e-redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 45s
    restart: unless-stopped

volumes:
  e2e_postgres_data:
  e2e_redis_data:
  e2e_backups:
  e2e_herder_backups:
  e2e_data:
  e2e_certs:
