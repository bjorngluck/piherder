schema_version: 1
slug: pihole
name: Pi-hole
description: Network-wide ad blocking DNS (pihole/pihole).
category: dns
version: "1.1.0"
tags: [dns, pihole]
variables:
  - name: PROJECT_NAME
    label: Project folder name
    type: string
    default: pihole
    required: true
  - name: WEBPASSWORD
    label: Admin web password
    type: password
    secret: true
    generate: true
    required: true
  - name: DNS_PORT
    label: DNS port (host)
    type: port
    default: "53"
    help: Host must free port 53 (disable systemd-resolved stub if needed).
  - name: WEB_PORT
    label: Admin web port (host)
    type: port
    default: "8080"
  - name: TZ
    label: Timezone
    type: string
    default: UTC
  - name: PIHOLE_HOSTNAME
    label: Hostname for DNS checklist
    type: string
    default: pihole.example.com
    required: false
  - name: PIHOLE_ETC
    label: Pi-hole config storage (/etc/pihole)
    type: volume
    volume_target: /etc/pihole
    volume_default_mode: named
    default: pihole_etc
    required: true
  - name: PIHOLE_DNSMASQ
    label: dnsmasq storage (/etc/dnsmasq.d)
    type: volume
    volume_target: /etc/dnsmasq.d
    volume_default_mode: named
    default: pihole_dnsmasq
    required: true
files:
  - path: docker-compose.yml
  - path: .env
    from: .env.sample
checklist:
  - title: DNS (manual)
    body: |
      Point clients or your router DHCP DNS to this host's IP.
      Optional A record {{PIHOLE_HOSTNAME}} for the admin UI behind NPM.
  - title: First login
    body: |
      Admin UI: http://HOST:{{WEB_PORT}}/admin — password is the WEBPASSWORD you set.
  - title: PiHerder link
    body: |
      Set PIHOLE_URL in PiHerder's environment if you want the dashboard deep link
      (multi-instance connector is planned).
options:
  supports_docker_secrets: true
