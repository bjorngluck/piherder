services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
      - "{{DNS_PORT}}:53/tcp"
      - "{{DNS_PORT}}:53/udp"
      - "{{WEB_PORT}}:80/tcp"
    environment:
      TZ: ${TZ}
      WEBPASSWORD: ${WEBPASSWORD}
      FTLCONF_LOCAL_IPV4: ${FTLCONF_LOCAL_IPV4:-}
    volumes:
      - {{PIHOLE_ETC}}
      - {{PIHOLE_DNSMASQ}}
    cap_add:
      - NET_ADMIN

volumes:
  pihole_etc:
  pihole_dnsmasq:
