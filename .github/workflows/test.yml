name: Tests

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "migrations/**"
      - "pyproject.toml"
      - "uv.lock"
      - "requirements.lock.txt"
      - "requirements.runtime.lock.txt"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "migrations/**"
      - "pyproject.toml"
      - "uv.lock"
      - "requirements.lock.txt"
      - "requirements.runtime.lock.txt"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.lock.txt
            pyproject.toml

      - name: Install locked deps + package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Pinned + hashed transitive set (from uv.lock export)
          pip install --require-hashes -r requirements.lock.txt
          # Project only — do not re-resolve third-party deps
          pip install --no-deps -e .
          # Coverage reporter (not hashed in lock; report-only, no fail-under yet)
          pip install "pytest-cov>=5.0"

      - name: Run unit tests
        env:
          # Must be a *valid* Fernet key. Empty string used to break --cov import order
          # (Settings cached with KEY="" before conftest could regenerate).
          # Unit-test only — not a production secret.
          PIHERDER_MASTER_KEY: "vf4uXbk1CDlP49homyiHbTOaGu1Z6yXgsLe0NlE8L6Y="
          DATABASE_URL: "postgresql://piherder:piherder@localhost:5432/piherder"
          SECRET_KEY: "ci-unit-test-secret-key-not-for-production-use"
        run: |
          pytest -q --tb=short \
            --cov=app \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml \
            --cov-fail-under=55

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
