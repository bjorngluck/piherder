name: Tests

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "migrations/**"
      - "pyproject.toml"
      - "uv.lock"
      - "requirements.lock.txt"
      - "requirements.runtime.lock.txt"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "migrations/**"
      - "pyproject.toml"
      - "uv.lock"
      - "requirements.lock.txt"
      - "requirements.runtime.lock.txt"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.lock.txt
            pyproject.toml

      - name: Install locked deps + package
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Pinned + hashed transitive set (from uv.lock export)
          pip install --require-hashes -r requirements.lock.txt
          # Project only — do not re-resolve third-party deps
          pip install --no-deps -e .

      - name: Run unit tests
        env:
          # conftest also sets these if missing; explicit for clarity
          PIHERDER_MASTER_KEY: ""
          DATABASE_URL: "postgresql://piherder:piherder@localhost:5432/piherder"
        run: pytest -q --tb=short
