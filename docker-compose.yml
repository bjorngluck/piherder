# Shared app env for web + celery (values from host `.env` / shell; see `.env.example`).
x-piherder-app-env: &piherder-app-env
  PIHERDER_MASTER_KEY: ${PIHERDER_MASTER_KEY}
  # Web + main celery never consume queue nmap (see celery-worker-nmap).
  PIHERDER_NMAP_WORKER: "0"
  SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
  DATABASE_URL: ${DATABASE_URL:-postgresql://piherder:piherder@db:5432/piherder}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  DATA_ROOT: ${DATA_ROOT:-/data}
  BACKUP_ROOT: ${BACKUP_ROOT:-/backups}
  HERDER_BACKUP_ROOT: ${HERDER_BACKUP_ROOT:-/herder_backups}
  DEFAULT_DOCKER_BASE: ${DEFAULT_DOCKER_BASE:-~/docker}
  AVATAR_MAX_BYTES: ${AVATAR_MAX_BYTES:-2097152}
  ALGORITHM: ${ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
  TRUSTED_DEVICE_DAYS: ${TRUSTED_DEVICE_DAYS:-30}
  ALLOW_OPEN_REGISTRATION: ${ALLOW_OPEN_REGISTRATION:-false}
  PIHERDER_HOSTNAME: ${PIHERDER_HOSTNAME:-}
  PIHERDER_PUBLIC_URL: ${PIHERDER_PUBLIC_URL:-}
  VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
  VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
  VAPID_CONTACT: ${VAPID_CONTACT:-}
  WEBHOOK_URL: ${WEBHOOK_URL:-}
  WEBHOOK_NUMBER: ${WEBHOOK_NUMBER:-}
  WEBHOOK_RECIPIENTS: ${WEBHOOK_RECIPIENTS:-}
  HERDER_BACKUP_SCHEDULE: ${HERDER_BACKUP_SCHEDULE:-}
  PIHOLE_URL: ${PIHOLE_URL:-http://pi.hole/admin/}
  METRICS_TOKEN: ${METRICS_TOKEN:-}
  METRICS_BACKUP_STALE_HOURS: ${METRICS_BACKUP_STALE_HOURS:-36}
  CORS_ORIGINS: ${CORS_ORIGINS:-}
  PIHERDER_SERVER_LOCK_TTL: ${PIHERDER_SERVER_LOCK_TTL:-7200}
  PIHERDER_NMAP_VULN_ROOT: ${PIHERDER_NMAP_VULN_ROOT:-/var/lib/piherder/nmap-vuln}
  TZ: ${TZ:-Etc/UTC}

# App image — **local build by default** (dev / RC testing on this host).
#   docker compose build web celery-worker && docker compose up -d
# Production Hub pull (no rebuild):
#   PIHERDER_IMAGE=bjorngluck/piherder:0.7.0 docker compose up -d --no-build
#   (or :latest after a published release)
# Override tag name only: PIHERDER_IMAGE=piherder:dev docker compose build
x-piherder-image: &piherder-image
  image: ${PIHERDER_IMAGE:-piherder:local}
  build:
    context: .
    dockerfile: Dockerfile

services:
  web:
    <<: *piherder-image
    container_name: piherder-web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    environment:
      <<: *piherder-app-env
      # Edge cert apply (this instance → Caddy); defaults match mounts below
      EDGE_CERTS_DIR: ${EDGE_CERTS_DIR:-/certs}
      CADDY_ADMIN_URL: ${CADDY_ADMIN_URL:-http://caddy:2019}
      CADDYFILE_PATH: ${CADDYFILE_PATH:-/caddy/Caddyfile}
    volumes:
      # Host path for rsync backup destinations (override if you use another dir)
      - ${PIHERDER_BACKUP_HOST_PATH:-./backups}:/backups
      - ./piherder_backups:/herder_backups
      - ./piherder_data:/data
      # Edge TLS: vault → write PEMs here; Caddy reads same host dir (no SSH/sudo)
      - ./certs:/certs
      - ./Caddyfile:/caddy/Caddyfile:ro
      # LAN vuln pack (same host dir as celery-worker-nmap) so Overview can show pack status.
      # Read-only — only the nmap worker writes downloads into this volume.
      - ${PIHERDER_NMAP_VULN_PATH:-./piherder_nmap_vuln}:/var/lib/piherder/nmap-vuln:ro
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: piherder-db
    environment:
      - POSTGRES_USER=piherder
      - POSTGRES_PASSWORD=piherder
      - POSTGRES_DB=piherder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Loopback only — for nmap worker in host-network mode
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: piherder-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # Loopback only — for nmap worker in host-network mode
    ports:
      - "127.0.0.1:6379:6379"

  # Multi-worker: raise CELERY_CONCURRENCY (default 2) so backups run in parallel
  # across hosts. Per-server Redis mutex prevents two rsyncs to the same host.
  # Shared volume mounts with `web` are required. Cancel still uses Job.celery_task_id.
  # To run multiple containers instead: remove container_name and
  # `docker compose up -d --scale celery-worker=N` (each replica needs the same volumes).
  celery-worker:
    <<: *piherder-image
    container_name: piherder-celery
    command: >
      celery -A app.celery_app.celery worker
      --loglevel=info
      --concurrency=${CELERY_CONCURRENCY:-2}
    restart: unless-stopped
    environment:
      <<: *piherder-app-env
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-2}
    volumes:
      # Must match web — multi-worker rsync writes here
      - ${PIHERDER_BACKUP_HOST_PATH:-./backups}:/backups
      - ./piherder_backups:/herder_backups
      - ./piherder_data:/data
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 45s
      timeout: 15s
      retries: 5
      start_period: 60s

  # LAN discovery (nmap) — opt-in profile. Default `docker compose up` does not start this.
  #   docker build -f Dockerfile.nmap -t piherder:nmap-local .
  #   docker compose --profile nmap up -d celery-worker-nmap
  # Vulners / CVE artefacts live on the host volume (not in the image):
  #   ./piherder_nmap_vuln → /var/lib/piherder/nmap-vuln
  #
  # Security boundary: root + host network + queue nmap only. Never add -Q nmap
  # to the main celery-worker. Task code refuses when PIHERDER_NMAP_WORKER=0 or
  # when the nmap binary is missing (worker_guard).
  #
  # **Host network** is required for MAC addresses (ARP/L2). Docker bridge only sees L3,
  # so XML never gets addrtype=mac. Hostnames need reverse DNS (uncheck Skip DNS) and/or PTR.
  celery-worker-nmap:
    profiles: ["nmap"]
    image: ${PIHERDER_NMAP_IMAGE:-piherder:nmap-local}
    build:
      context: .
      dockerfile: Dockerfile.nmap
    container_name: piherder-celery-nmap
    # Same L2 as the Pi’s LAN interface → ARP MACs + better discovery
    network_mode: host
    command: >
      celery -A app.celery_app.celery worker
      --loglevel=info
      -Q nmap
      --concurrency=1
      -n nmap@%h
    restart: unless-stopped
    environment:
      <<: *piherder-app-env
      # Override web default — this process is the only allowed nmap executor
      PIHERDER_NMAP_WORKER: "1"
      PIHERDER_NMAP_VULN_ROOT: /var/lib/piherder/nmap-vuln
      # Host network: compose service DNS (redis/db) is unavailable — use loopback ports.
      CELERY_BROKER_URL: ${PIHERDER_NMAP_REDIS_URL:-redis://127.0.0.1:6379/0}
      CELERY_RESULT_BACKEND: ${PIHERDER_NMAP_REDIS_URL:-redis://127.0.0.1:6379/0}
      REDIS_URL: ${PIHERDER_NMAP_REDIS_URL:-redis://127.0.0.1:6379/0}
      DATABASE_URL: ${PIHERDER_NMAP_DATABASE_URL:-postgresql://piherder:piherder@127.0.0.1:5432/piherder}
    volumes:
      - ./piherder_data:/data
      - ${PIHERDER_NMAP_VULN_PATH:-./piherder_nmap_vuln}:/var/lib/piherder/nmap-vuln
    depends_on:
      - db
      - redis
    # Root + raw caps: SYN, ARP, OS detect
    cap_add:
      - NET_RAW
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "python", "-c", "import shutil,sys; sys.exit(0 if shutil.which('nmap') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2
    container_name: piherder-caddy
    ports:
      - "8888:80"
      - "8443:443"
    environment:
      # Public hostname for the HTTPS site block (e.g. piherder.example.com)
      - PIHERDER_HOSTNAME=${PIHERDER_HOSTNAME:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Trusted TLS: place fullchain.pem + privkey.pem here (see certs/README.md)
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - web

  # E2E services: docker-compose.e2e.yml (same project, compose set "e2e")
  #   docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  redis_data:
