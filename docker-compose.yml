services:
  web:
    build: .
    container_name: piherder-web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    environment:
      - PIHERDER_MASTER_KEY=${PIHERDER_MASTER_KEY}
      - DATABASE_URL=postgresql://piherder:piherder@db:5432/piherder
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ~/backup:/backups
      - ./piherder_backups:/herder_backups
      - ./app:/app/app
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: piherder-db
    environment:
      - POSTGRES_USER=piherder
      - POSTGRES_PASSWORD=piherder
      - POSTGRES_DB=piherder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: piherder-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  celery-worker:
    build: .
    container_name: piherder-celery
    command: celery -A app.celery_app.celery worker --loglevel=info --concurrency=1
    restart: unless-stopped
    environment:
      - PIHERDER_MASTER_KEY=${PIHERDER_MASTER_KEY}
      - DATABASE_URL=postgresql://piherder:piherder@db:5432/piherder
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ~/backup:/backups
      - ./piherder_backups:/herder_backups
      - ./app:/app/app
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 45s
      timeout: 15s
      retries: 5
      start_period: 60s

  caddy:
    image: caddy:2
    container_name: piherder-caddy
    ports:
      - "8888:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - web

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  redis_data:
