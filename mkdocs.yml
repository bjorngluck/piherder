# PiHerder user + developer wiki
# Build:  pip install -r requirements-docs.txt && mkdocs serve
# Deploy: GitHub Actions → GitHub Pages (see .github/workflows/docs.yml)

site_name: PiHerder Docs
site_description: Operator and developer documentation for PiHerder — fleet management for Raspberry Pi and Linux hosts.
site_author: Bjorn Gluck
site_url: https://bjorngluck.github.io/piherder/
repo_url: https://github.com/bjorngluck/piherder
repo_name: bjorngluck/piherder
edit_uri: edit/main/wiki/
docs_dir: wiki
site_dir: site
copyright: Copyright &copy; 2026 Bjorn Gluck · PolyForm Noncommercial 1.0.0

# Do not treat repo notes as site pages (README conflicts with index.md in strict mode)
exclude_docs: |
  README.md
  assets/screenshots/README.md

theme:
  name: material
  custom_dir: wiki/overrides
  # Official PiHerder mascot (same artwork as README / app) — not the placeholder SVG
  logo: assets/piherder-logo-header.png
  favicon: assets/favicon.png
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      scheme: default
      primary: red
      accent: green
      toggle:
        icon: material/brightness-auto
        name: System theme
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Light mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: green
      toggle:
        icon: material/weather-night
        name: Dark mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: material/information-outline
      tip: material/lightbulb-outline
      warning: material/alert-outline
      danger: material/lightning-bolt
      success: material/check-circle-outline

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: en
  - tags
  - minify:
      minify_html: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - wiki
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bjorngluck/piherder
      name: GitHub
  generator: false


